name: Backend Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install PyTorch backends
        # MindSpore requires Linux x86 with specific GLIBC and is multi-GB;
        # CI only validates the PyTorch-based backends (TorchQuantum, Qiskit)
        # and the backend routing logic.
        #
        # torchquantum==0.1.8 declares qiskit<1.0.0 as a dependency, but our
        # code only uses tq.QuantumDevice / tqf.rx/ry/rz/cnot — no qiskit at all.
        # Installing with --no-deps avoids the conflict with qiskit 1.x used by
        # qiskit-machine-learning.  Essential runtime deps (opt-einsum, etc.) are
        # installed explicitly below.
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torchquantum==0.1.8 --no-deps
          pip install opt-einsum pylatexenc torchpack pathos tqdm dill torchdiffeq
          pip install qiskit==1.4.5 qiskit-machine-learning==0.8.4
          pip install numpy scipy matplotlib

      - name: Apply TorchQuantum patches for Qiskit 1.x compatibility
        run: |
          python - <<'EOF'
          import site, os, re

          site_pkg = site.getsitepackages()[0]

          # patch 1: torchquantum/plugin/__init__.py — wrap entire file in try/except
          # so stale qiskit-0.x imports don't crash on import (we installed --no-deps,
          # but TQ may still reference qiskit internally).
          p1 = os.path.join(site_pkg, "torchquantum/plugin/__init__.py")
          if os.path.exists(p1):
              txt = open(p1).read()
              if not txt.startswith("try:"):
                  open(p1, "w").write("try:\n    " +
                      txt.replace("\n", "\n    ") + "\nexcept Exception:\n    pass\n")

          # patch 2: torchquantum/util/utils.py — wrap qiskit 0.x imports removed in 1.x
          p2 = os.path.join(site_pkg, "torchquantum/util/utils.py")
          if os.path.exists(p2):
              txt = open(p2).read()
              # qiskit_ibm_runtime was removed in qiskit 1.x
              txt = re.sub(
                  r"(from qiskit_ibm_runtime.*)",
                  r"try:\n    \1\nexcept Exception:\n    pass",
                  txt
              )
              # qiskit.providers.aer moved to separate qiskit-aer package in qiskit 1.x
              txt = re.sub(
                  r"(from qiskit\.providers\.aer.*)",
                  r"try:\n    \1\nexcept Exception:\n    pass",
                  txt
              )
              open(p2, "w").write(txt)

          print("Patches applied")
          EOF

      - name: Verify torchquantum import
        run: |
          python - <<'EOF'
          try:
              import torchquantum as tq
              print(f"torchquantum {tq.__version__} imported OK")
          except Exception as e:
              import traceback
              print(f"torchquantum import FAILED: {e}")
              traceback.print_exc()
              raise
          EOF

      - name: Run backend tests (TorchQuantum + Qiskit + routing)
        run: |
          python test_backends.py
        env:
          PYTHONPATH: ${{ github.workspace }}
