name: Backend Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install PyTorch backends
        # MindSpore requires Linux x86 with specific GLIBC and is multi-GB;
        # CI only validates the PyTorch-based backends (TorchQuantum, Qiskit)
        # and the backend routing logic.
        #
        # torchquantum==0.1.8 declares qiskit<1.0.0 as a dependency, but our
        # code only uses tq.QuantumDevice / tqf.rx/ry/rz/cnot — no qiskit at all.
        # Installing with --no-deps avoids the conflict with qiskit 1.x used by
        # qiskit-machine-learning.  Essential runtime deps (opt-einsum, etc.) are
        # installed explicitly below.
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torchquantum==0.1.8 --no-deps
          pip install opt-einsum pylatexenc torchpack pathos tqdm dill torchdiffeq
          pip install qiskit==1.4.5 qiskit-machine-learning==0.8.4
          pip install numpy scipy matplotlib

      - name: Apply TorchQuantum patches for Qiskit 1.x compatibility
        run: |
          python - <<'EOF'
          import site, os, re

          site_pkg = site.getsitepackages()[0]
          tq_root = os.path.join(site_pkg, "torchquantum")

          if not os.path.isdir(tq_root):
              print("torchquantum not found, skipping")
              exit(0)

          # Fix 1: Stub out TQ sub-packages that import broken/heavy deps.
          # We only use: tq.QuantumDevice (device), tqf.rx/ry/rz/cnot (functional).
          # plugin/qiskit → qiskit 0.x APIs (removed in 1.x)
          # dataset       → torchvision (version mismatch with torch)
          STUBS = {
              "plugin/qiskit/__init__.py": (
                  "# Stub: qiskit 0.x plugin disabled for qiskit 1.x compatibility\n"
                  "QISKIT_INCOMPATIBLE_FUNC_NAMES = []\n"
              ),
              "dataset/__init__.py": (
                  "# Stub: dataset module disabled (torchvision not installed)\n"
              ),
          }
          for rel_path, content in STUBS.items():
              fp = os.path.join(tq_root, rel_path)
              if os.path.exists(fp):
                  open(fp, "w").write(content)
                  print(f"Stubbed: torchquantum/{rel_path}")

          # Fix 2: Wrap remaining direct qiskit 0.x imports outside the plugin dir
          # (e.g. qiskit.providers.aer in util/utils.py).
          BROKEN = re.compile(
              r'^([ \t]*)((?:from|import) qiskit[^\n]*|from qiskit_ibm_runtime[^\n]*|import qiskit_ibm_runtime[^\n]*)',
              re.MULTILINE
          )

          def wrap(m):
              ind, stmt = m.group(1), m.group(2)
              return f"{ind}try:\n{ind}    {stmt}\n{ind}except Exception:\n{ind}    pass"

          patched = 0
          stub_dirs = [
              os.path.join(tq_root, "plugin", "qiskit"),
              os.path.join(tq_root, "dataset"),
          ]
          for dirpath, _, filenames in os.walk(tq_root):
              if any(dirpath.startswith(d) for d in stub_dirs):
                  continue  # already stubbed above
              for fn in filenames:
                  if not fn.endswith(".py"):
                      continue
                  fp = os.path.join(dirpath, fn)
                  try:
                      txt = open(fp).read()
                  except Exception:
                      continue
                  new_txt = BROKEN.sub(wrap, txt)
                  if new_txt != txt:
                      open(fp, "w").write(new_txt)
                      patched += 1
                      print(f"Patched: {fp.replace(site_pkg + os.sep, '')}")

          print(f"Done — {patched} additional files patched")
          EOF

      - name: Run backend tests (TorchQuantum + Qiskit + routing)
        run: |
          python test_backends.py
        env:
          PYTHONPATH: ${{ github.workspace }}
