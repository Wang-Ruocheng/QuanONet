name: Backend Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install PyTorch backends
        # MindSpore requires Linux x86 with specific GLIBC and is multi-GB;
        # CI only validates the PyTorch-based backends (TorchQuantum, Qiskit)
        # and the backend routing logic.
        run: |
          pip install --upgrade pip
          pip install torch==2.8.0 --index-url https://download.pytorch.org/whl/cpu
          pip install torchquantum==0.1.8
          pip install qiskit==1.4.5 qiskit-machine-learning==0.8.4
          pip install numpy==1.26.4 scipy matplotlib

      - name: Apply TorchQuantum patches for Qiskit 1.x compatibility
        run: |
          python - <<'EOF'
          import site, os, re

          site_pkg = site.getsitepackages()[0]

          # patch 1: torchquantum/plugin/__init__.py
          p1 = os.path.join(site_pkg, "torchquantum/plugin/__init__.py")
          if os.path.exists(p1):
              txt = open(p1).read()
              if "try:" not in txt:
                  open(p1, "w").write("try:\n    " +
                      txt.replace("\n", "\n    ") + "\nexcept Exception:\n    pass\n")

          # patch 2: torchquantum/util/utils.py — wrap qiskit_ibm_runtime import
          p2 = os.path.join(site_pkg, "torchquantum/util/utils.py")
          if os.path.exists(p2):
              txt = open(p2).read()
              txt = re.sub(
                  r"(from qiskit_ibm_runtime.*)",
                  r"try:\n    \1\nexcept Exception:\n    pass",
                  txt
              )
              open(p2, "w").write(txt)

          print("Patches applied")
          EOF

      - name: Run backend tests (TorchQuantum + Qiskit + routing)
        run: |
          python test_backends.py
        env:
          PYTHONPATH: ${{ github.workspace }}
